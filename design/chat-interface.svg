<svg width="1000" height="720" viewBox="0 0 1000 720" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Archivo, 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <!-- ===== tokens (from globals.css) =====
       bg #ffffff  ink #000  muted #6b6b6b  pale #f2f2f2  border #d1d1d1
       mta #0039a6  mta-soft #e2eaf7  ok #8dc572 -->

  <!-- page background -->
  <rect width="1000" height="720" fill="#f2f2f2"/>

  <!-- ============ CHAT PANE container ============ -->
  <rect x="40" y="32" width="920" height="656" fill="#ffffff" stroke="#d1d1d1"/>

  <!-- ---------- message list (scroll area) ---------- -->

  <!-- assistant bubble: Railio header -->
  <g>
    <rect x="64" y="56" width="500" height="156" fill="#f2f2f2" stroke="#d1d1d1"/>
    <text x="80" y="82" font-size="11" font-weight="700" letter-spacing="0.66" fill="#6b6b6b">RAILIO</text>
    <text x="80" y="108" font-size="14" fill="#000000">Fault 7110 on ES44DC points to a traction</text>
    <text x="80" y="128" font-size="14" fill="#000000">motor blower fault. Per the manual, check the</text>
    <text x="80" y="148" font-size="14" fill="#000000">blower motor contactor and inlet screen first.</text>
    <!-- citation pills -->
    <g>
      <rect x="80" y="166" width="186" height="26" rx="0" fill="#e2eaf7" stroke="#0039a6"/>
      <text x="92" y="183" font-size="12" fill="#0039a6">📖 49 CFR §229.45</text>
      <rect x="274" y="166" width="200" height="26" fill="#f2f2f2" stroke="#d1d1d1"/>
      <text x="286" y="183" font-size="12" fill="#222222">👤 Tribal: blower notes</text>
    </g>
  </g>

  <!-- user bubble (right-aligned) -->
  <g>
    <rect x="556" y="232" width="380" height="74" fill="#0039a6"/>
    <text x="572" y="258" font-size="11" font-weight="700" letter-spacing="0.66" fill="#cdd8ef">TECH</text>
    <text x="572" y="284" font-size="14" fill="#ffffff">It's throwing 7110 and the unit won't load.</text>
  </g>

  <!-- assistant bubble with tool pill + photo request -->
  <g>
    <rect x="64" y="326" width="520" height="232" fill="#f2f2f2" stroke="#d1d1d1"/>
    <!-- live header w/ dot -->
    <circle cx="86" cy="348" r="4" fill="#8dc572"/>
    <text x="98" y="352" font-size="11" font-weight="700" letter-spacing="0.66" fill="#0039a6">RAILIO</text>
    <!-- tool pill -->
    <rect x="80" y="364" width="170" height="24" fill="#0a0a0a"/>
    <text x="92" y="380" font-size="11" fill="#e5e5e5">🔧 Checking the manual...</text>
    <!-- text -->
    <text x="80" y="412" font-size="14" fill="#000000">Before I confirm, I need to see the blower</text>
    <text x="80" y="432" font-size="14" fill="#000000">housing.</text>
    <!-- photo-needed block -->
    <rect x="80" y="446" width="488" height="96" fill="#e2eaf7" stroke="#0039a6"/>
    <text x="92" y="470" font-size="11" font-weight="700" letter-spacing="0.66" fill="#0039a6">📷 PHOTO NEEDED</text>
    <text x="92" y="492" font-size="14" fill="#000000">Snap the blower motor contactor.</text>
    <text x="92" y="510" font-size="12" fill="#6b6b6b">Why: confirm contactor isn't pitted or open.</text>
    <rect x="92" y="518" width="128" height="20" fill="#0039a6"/>
    <text x="104" y="532" font-size="12" font-weight="700" fill="#ffffff">Send photo →</text>
  </g>

  <!-- ---------- composer ---------- -->
  <rect x="41" y="592" width="918" height="95" fill="#f2f2f2"/>
  <line x1="41" y1="592" x2="959" y2="592" stroke="#d1d1d1"/>

  <!-- photo upload (compact) -->
  <text x="64" y="615" font-size="12" fill="#6b6b6b">＋ Add photo</text>

  <!-- composer row: mic + textarea + send -->
  <!-- mic button -->
  <rect x="64" y="624" width="48" height="48" fill="#ffffff" stroke="#d1d1d1"/>
  <text x="80" y="654" font-size="20">🎙</text>
  <!-- textarea -->
  <rect x="120" y="624" width="700" height="48" fill="#ffffff" stroke="#d1d1d1"/>
  <text x="134" y="652" font-size="14" fill="#6b6b6b">Message…</text>
  <!-- send button -->
  <rect x="828" y="624" width="108" height="48" fill="#0039a6"/>
  <text x="862" y="654" font-size="14" font-weight="700" fill="#ffffff">Send</text>
</svg>
